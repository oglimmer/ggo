<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<th:block th:fragment="availableGames">
    <div th:each="i : ${availableGames}" class="game-list-item">
        <a th:href="@{/JoinGame(gameId=${i.id})}" class="btn btn-primary btn-lg">
            Join game <span th:text="${i.id}"></span>
            <span style="font-weight: 400; opacity: 0.7; font-family: 'Share Tech Mono', monospace; font-size: 0.8em;">&middot; started <span th:text="${#dates.format(i.createdOn, 'dd.MM.yyyy HH:mm')}"></span></span>
        </a>
    </div>
</th:block>

</html>
