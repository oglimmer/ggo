<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout('Create Game - GridGameOne', ~{::content})}">
<th:block th:fragment="content">

    <div class="jumbotron">
        <div id="divWaitingForOtherPlayer" class="waiting-status" style="display:none">
            <h3>Game <span id="gameId"></span> created</h3>
            <p>Waiting for another player to join <span id="waitingProgress"></span></p>
            <p style="font-size: 0.8rem; color: #4a6a58; margin-top: 16px; font-family: 'Share Tech Mono', monospace;">
                We notified <span id="numberOfNotifications"></span> by email.
                If no one joins, you can register for email notifications on the landing page
                or create a play-by-email game.
            </p>
        </div>
        <div id="divChooseType">
            <h3>Choose a game mode</h3>
            <div class="game-type-grid">
                <button id="btnRealTime" class="game-type-card">You vs Human</button>
                <button id="btnAi" class="game-type-card">You vs A.I.</button>
                <button id="btnTutorial" class="game-type-card">Tutorial</button>
            </div>
        </div>
    </div>

    <script data-main="js/createGame.js" th:src="@{/webjars/requirejs/2.2.0/require.min.js}"></script>

</th:block>
</html>
