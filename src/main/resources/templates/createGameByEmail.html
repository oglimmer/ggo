<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout('Create Game by Email - GridGameOne', ~{::content})}">
<th:block th:fragment="content">

    <div class="jumbotron">
        <h3>Play by Email</h3>
        <p style="color: #6b7280; margin-bottom: 24px;">
            We won't store your email addresses permanently. As soon as the game ends, your personal email address is removed from memory.
        </p>

        <div th:if="${#fields.hasErrors('createGameForm')}" class="alert alert-danger">
            <ul style="margin: 0; padding-left: 20px;">
                <li th:each="err : ${#fields.errors('createGameForm.*')}" th:text="${err}"></li>
            </ul>
        </div>

        <form th:action="@{/CreateGameByEmail}" th:object="${createGameForm}" method="post">
            <div class="form-group">
                <label>Your email address</label>
                <input th:field="*{email1}" class="form-control" />
                <span th:if="${#fields.hasErrors('email1')}" th:errors="*{email1}" class="text-danger"></span>
            </div>
            <div class="form-group">
                <label>Opponent's email address</label>
                <input th:field="*{email2}" id="email2" class="form-control" />
                <span th:if="${#fields.hasErrors('email2')}" th:errors="*{email2}" class="text-danger"></span>
                <div style="margin-top: 8px;">
                    <input th:field="*{searchForOne}" type="checkbox" id="searchForOne" />
                    <label for="searchForOne" style="font-weight: 400; color: #6b7280; font-size: 0.85rem;">
                        I don't have an opponent, use player's database (no longer supported due to GDPR)
                    </label>
                </div>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 24px;">
                <button type="submit" class="btn btn-primary">Create Game</button>
                <a th:href="@{/}" class="btn btn-primary" style="background-color: #6b7280 !important;">Cancel</a>
            </div>
        </form>
    </div>

    <script data-main="js/createGameByEmail.js" th:src="@{/webjars/requirejs/2.2.0/require.min.js}"></script>

</th:block>
</html>
